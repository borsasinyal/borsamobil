{% extends "base.html" %}

{% block title %}Ana Sayfa - BorsaSinyal{% endblock %}

{% block content %}
<div x-data="dashboard()" x-init="loadData()">
    
    <!-- Hoşgeldin -->
    <div class="slide-up mb-4">
        <h2 class="text-2xl font-bold mb-1">Merhaba 👋</h2>
        <p class="text-white/60 text-sm" x-text="getDateString()"></p>
    </div>
    
    <!-- İstatistik Kartları -->
    <div class="grid grid-cols-2 gap-3 mb-4 slide-up">
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-2">
                <span class="text-white/60 text-xs">BUGÜN</span>
                <i class="fas fa-bolt text-purple-400"></i>
            </div>
            <div class="text-2xl font-bold" x-text="stats.today_count"></div>
            <div class="text-xs text-white/50">sinyal</div>
        </div>
        
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-2">
                <span class="text-white/60 text-xs">ORT. SKOR</span>
                <i class="fas fa-star text-yellow-400"></i>
            </div>
            <div class="text-2xl font-bold" x-text="stats.today_avg_score"></div>
            <div class="text-xs text-white/50">/100</div>
        </div>
    </div>
    
    <!-- En İyi Sinyal -->
    <template x-if="stats.top_signal">
        <div class="glass rounded-2xl p-4 mb-4 slide-up glow border-2 border-purple-500/30">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-xs text-white/60 uppercase tracking-wider">Günün En İyisi</span>
            </div>
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-2xl font-bold" x-text="stats.top_signal.symbol"></div>
                    <div class="text-white/60 text-sm" x-text="stats.top_signal.price.toFixed(2) + ' TL'"></div>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-bold text-purple-400" x-text="stats.top_signal.score"></div>
                    <div class="text-xs text-white/50">SKOR</div>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Son Sinyaller -->
    <div class="mb-4">
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-lg font-bold">🔥 Son Sinyaller</h3>
            <a href="/signals" class="text-purple-400 text-sm">Tümü →</a>
        </div>
        
        <template x-if="loading">
            <div class="glass rounded-2xl p-8 text-center">
                <i class="fas fa-spinner fa-spin text-3xl text-purple-400 mb-2"></i>
                <p class="text-white/60">Yükleniyor...</p>
            </div>
        </template>
        
        <template x-if="!loading && signals.length === 0">
            <div class="glass rounded-2xl p-8 text-center">
                <i class="fas fa-inbox text-4xl text-white/30 mb-2"></i>
                <p class="text-white/60">Henüz sinyal yok</p>
                <p class="text-white/40 text-sm mt-1">Tarama yapın</p>
            </div>
        </template>
        
        <div class="space-y-3">
            <template x-for="signal in signals" :key="signal.id">
                <a :href="'/stock/' + signal.symbol" class="block glass rounded-2xl p-4 slide-up hover:bg-white/5 transition">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                                 :class="getScoreGradient(signal.score)">
                                <span x-text="getScoreEmoji(signal.score)"></span>
                            </div>
                            <div>
                                <div class="font-bold text-lg" x-text="signal.symbol"></div>
                                <div class="text-white/60 text-sm" x-text="signal.price.toFixed(2) + ' TL'"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-bold" :class="getScoreColor(signal.score)" x-text="signal.score"></div>
                            <div class="text-xs text-white/50">/100</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-white/5 rounded-lg py-2">
                            <div class="text-xs text-white/50 mb-1">Hedef</div>
                            <div class="text-sm font-semibold text-green-400" x-text="signal.target_price ? signal.target_price.toFixed(2) : '-'"></div>
                        </div>
                        <div class="bg-white/5 rounded-lg py-2">
                            <div class="text-xs text-white/50 mb-1">Stop</div>
                            <div class="text-sm font-semibold text-red-400" x-text="signal.stop_loss ? signal.stop_loss.toFixed(2) : '-'"></div>
                        </div>
                        <div class="bg-white/5 rounded-lg py-2">
                            <div class="text-xs text-white/50 mb-1">Zaman</div>
                            <div class="text-sm font-semibold" x-text="formatTime(signal.created_at)"></div>
                        </div>
                    </div>
                </a>
            </template>
        </div>
    </div>
    
    <!-- Hızlı Tarama Butonu -->
    <a href="/scanner" class="block gradient-purple rounded-2xl p-4 text-center font-bold shadow-lg slide-up">
        <i class="fas fa-search mr-2"></i>
        ŞİMDİ TARA
    </a>
    
</div>

<script>
function dashboard() {
    return {
        loading: true,
        signals: [],
        stats: {
            today_count: 0,
            today_avg_score: 0,
            total_signals: 0,
            top_signal: null
        },
        
        async loadData() {
            try {
                // İstatistikler
                const statsRes = await fetch('/api/stats');
                this.stats = await statsRes.json();
                
                // Son sinyaller
                const sigRes = await fetch('/api/signals/latest?limit=10');
                this.signals = await sigRes.json();
                
            } catch (e) {
                console.error('Veri yükleme hatası:', e);
            } finally {
                this.loading = false;
            }
        },
        
        getDateString() {
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            const d = new Date();
            return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
        },
        
        getScoreColor(score) {
            if (score >= 85) return 'text-green-400';
            if (score >= 75) return 'text-emerald-400';
            if (score >= 65) return 'text-purple-400';
            return 'text-yellow-400';
        },
        
        getScoreGradient(score) {
            if (score >= 85) return 'gradient-green';
            if (score >= 75) return 'gradient-green';
            if (score >= 65) return 'gradient-purple';
            return 'gradient-yellow';
        },
        
        getScoreEmoji(score) {
            if (score >= 85) return '🔥';
            if (score >= 75) return '⚡';
            if (score >= 65) return '📈';
            return '🟡';
        },
        
        formatTime(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - d) / 1000 / 60);
            
            if (diff < 1) return 'şimdi';
            if (diff < 60) return diff + ' dk';
            if (diff < 1440) return Math.floor(diff/60) + ' sa';
            return Math.floor(diff/1440) + ' gün';
        }
    }
}
</script>
{% endblock %}
