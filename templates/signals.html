{% extends "base.html" %}
{% block title %}Sinyaller{% endblock %}

{% block content %}
<div x-data="signalsPage()" x-init="loadSignals()">
    
    <div class="mb-4">
        <h2 class="text-2xl font-bold mb-1">📊 Sinyaller</h2>
        <p class="text-white/60 text-sm">Tüm aktif sinyaller</p>
    </div>
    
    <!-- Filtre Tabları -->
    <div class="flex gap-2 mb-4 overflow-x-auto">
        <button @click="filter='all'; loadSignals()" 
                :class="filter==='all' ? 'gradient-purple' : 'glass'"
                class="px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap">
            Tümü
        </button>
        <button @click="filter='strong'; loadSignals()" 
                :class="filter==='strong' ? 'gradient-green' : 'glass'"
                class="px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap">
            🔥 Güçlü (75+)
        </button>
        <button @click="filter='today'; loadSignals()" 
                :class="filter==='today' ? 'gradient-blue' : 'glass'"
                class="px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap">
            📅 Bugün
        </button>
    </div>
    
    <template x-if="loading">
        <div class="glass rounded-2xl p-8 text-center">
            <i class="fas fa-spinner fa-spin text-3xl text-purple-400"></i>
        </div>
    </template>
    
    <template x-if="!loading && signals.length === 0">
        <div class="glass rounded-2xl p-8 text-center">
            <i class="fas fa-inbox text-4xl text-white/30 mb-2"></i>
            <p class="text-white/60">Sinyal yok</p>
        </div>
    </template>
    
    <div class="space-y-3">
        <template x-for="signal in signals" :key="signal.id">
            <a :href="'/stock/' + signal.symbol" class="block glass rounded-2xl p-4 slide-up">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl"
                             :class="getGradient(signal.score)">
                            <span x-text="getEmoji(signal.score)"></span>
                        </div>
                        <div>
                            <div class="font-bold text-lg" x-text="signal.symbol"></div>
                            <div class="text-white/60 text-sm" x-text="signal.price.toFixed(2) + ' TL'"></div>
                            <div class="text-xs text-white/40 mt-1">
                                <span x-text="getStrategyLabel(signal.strategy)"></span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold" :class="getColor(signal.score)" x-text="signal.score"></div>
                        <div class="text-xs text-white/50">/100</div>
                    </div>
                </div>
                
                <!-- Skor Bar -->
                <div class="w-full bg-white/10 rounded-full h-2 mb-3 overflow-hidden">
                    <div class="h-full rounded-full" 
                         :class="getGradient(signal.score)"
                         :style="'width: ' + signal.score + '%'"></div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-white/5 rounded-lg py-2">
                        <div class="text-xs text-white/50 mb-1">🎯 Hedef</div>
                        <div class="text-sm font-bold text-green-400" x-text="signal.target_price ? signal.target_price.toFixed(2) : '-'"></div>
                    </div>
                    <div class="bg-white/5 rounded-lg py-2">
                        <div class="text-xs text-white/50 mb-1">🛑 Stop</div>
                        <div class="text-sm font-bold text-red-400" x-text="signal.stop_loss ? signal.stop_loss.toFixed(2) : '-'"></div>
                    </div>
                    <div class="bg-white/5 rounded-lg py-2">
                        <div class="text-xs text-white/50 mb-1">⏰</div>
                        <div class="text-sm font-bold" x-text="formatTime(signal.created_at)"></div>
                    </div>
                </div>
            </a>
        </template>
    </div>
</div>

<script>
function signalsPage() {
    return {
        loading: true,
        signals: [],
        filter: 'all',
        
        async loadSignals() {
            this.loading = true;
            try {
                let url = '/api/signals/latest?limit=50';
                if (this.filter === 'today') url = '/api/signals/today';
                
                const res = await fetch(url);
                let data = await res.json();
                
                if (this.filter === 'strong') {
                    data = data.filter(s => s.score >= 75);
                }
                
                this.signals = data;
            } catch (e) {
                console.error(e);
            } finally {
                this.loading = false;
            }
        },
        
        getColor(s) {
            if (s >= 85) return 'text-green-400';
            if (s >= 75) return 'text-emerald-400';
            if (s >= 65) return 'text-purple-400';
            return 'text-yellow-400';
        },
        getGradient(s) {
            if (s >= 75) return 'gradient-green';
            if (s >= 65) return 'gradient-purple';
            return 'gradient-yellow';
        },
        getEmoji(s) {
            if (s >= 85) return '🔥';
            if (s >= 75) return '⚡';
            if (s >= 65) return '📈';
            return '🟡';
        },
        getStrategyLabel(s) {
            const labels = {
                'COK_GUCLU': 'Çok Güçlü Sinyal',
                'GUCLU': 'Güçlü Sinyal',
                'NORMAL': 'Normal Sinyal'
            };
            return labels[s] || s;
        },
        formatTime(d) {
            const date = new Date(d);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            if (diff < 1) return 'şimdi';
            if (diff < 60) return diff + 'dk';
            if (diff < 1440) return Math.floor(diff/60) + 'sa';
            return Math.floor(diff/1440) + 'g';
        }
    }
}
</script>
{% endblock %}
