name: Borsa Sinyal Bot

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Hangi görev?'
        required: true
        default: 'full_scan'
        type: choice
        options:
          - morning_preparation
          - premarket_report
          - market_open_scan
          - full_scan
          - quick_scan
          - strategy_scan
          - end_of_day_report
          - signal_tracker

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Repo indir
        uses: actions/checkout@v4
      
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Kutuphaneleri yukle
        run: |
          pip install --upgrade pip
          pip install flask yfinance pandas numpy python-telegram-bot apscheduler requests
      
      # ⭐ Veritabanını artifact'tan indir
      - name: Veritabanini indir (varsa)
        uses: actions/download-artifact@v4
        with:
          name: borsa-database
          path: ./
        continue-on-error: true
      
      # ⭐ Veritabanı yoksa oluştur, varsa DOKUNMA!
      - name: Veritabani durumu kontrol
        id: db_check
        run: |
          if [ -f "./borsa_sinyal.db" ]; then
            SIZE=$(stat -c%s "./borsa_sinyal.db")
            echo "Veritabani mevcut: $SIZE bytes"
            if [ "$SIZE" -lt "5000" ]; then
              echo "Veritabani cok kucuk, yeniden olusturulacak"
              echo "needs_init=true" >> $GITHUB_OUTPUT
            else
              echo "Veritabani dolu, dokunulmayacak"
              echo "needs_init=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Veritabani yok, olusturulacak"
            echo "needs_init=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Veritabani baslat (sadece gerekiyorsa)
        if: steps.db_check.outputs.needs_init == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python database.py
      
      - name: Gunluk veriyi cek (sadece tarama gorevlerinde)
        if: ${{ github.event.inputs.job_type != 'signal_tracker' && github.event.inputs.job_type != 'end_of_day_report' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.data_fetcher import fetch_all_daily; from config import BIST_SYMBOLS; fetch_all_daily(symbols_list=BIST_SYMBOLS, delay=0.05)"
      
      - name: Manuel gorev
        if: ${{ github.event.inputs.job_type != 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.scheduler import job_${{ github.event.inputs.job_type }}; job_${{ github.event.inputs.job_type }}()"
      
      - name: Sinyal takip gorevi
        if: ${{ github.event.inputs.job_type == 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.signal_tracker import track_signals_job; track_signals_job()"
      
      # ⭐ Veritabanını artifact olarak yükle
      - name: Veritabanini yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: borsa-database
          path: ./borsa_sinyal.db
          retention-days: 7
          overwrite: true
      
      - name: Tamamlandi
        run: echo "Gorev tamamlandi"
