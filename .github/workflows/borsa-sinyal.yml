name: Borsa Sinyal Bot

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Hangi görev?'
        required: true
        default: 'full_scan_with_tracking'
        type: choice
        options:
          - morning_preparation
          - premarket_report
          - market_open_scan
          - full_scan
          - quick_scan
          - 4h_scan
          - end_of_day_report
          - weekly_report
          - signal_tracker
          - full_scan_with_tracking

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Repo indir
        uses: actions/checkout@v4
      
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Kutuphaneleri yukle
        run: |
          pip install --upgrade pip
          pip install flask yfinance pandas numpy python-telegram-bot apscheduler requests
          pip install --upgrade git+https://github.com/rongardF/tvdatafeed.git
      
      # DB KALICILIĞI - ÖNCE ESKI DB'Yİ İNDİR
      - name: Eski DB indir (Artifact)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: bot-database
          path: .
          workflow: borsa-sinyal.yml
          workflow_conclusion: ""
          if_no_artifact_found: warn
        continue-on-error: true
      
      - name: DB durumu kontrol
        run: |
          if [ -f "borsa_bot.db" ]; then
            echo "✅ Eski DB bulundu ve indirildi"
            ls -lh borsa_bot.db
          else
            echo "⚠️ Eski DB yok, yeni oluşturulacak"
          fi
      
      - name: Veritabani baslat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python database.py
      
      - name: Veri cek ve Gorev calistir (BIRLESIK)
        if: ${{ github.event.inputs.job_type != 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          python << 'EOF'
          import sys
          from config import BIST_SYMBOLS
          
          job_type = "${{ github.event.inputs.job_type }}"
          
          # 4H TARAMASI - Veri çekme GEREKMEZ (TV'den direkt çeker)
          if job_type == "4h_scan":
              print("=" * 60)
              print("🕐 4 SAATLİK TARAMA (TV'den direkt)")
              print("=" * 60)
              from services.scheduler import job_4h_scan
              job_4h_scan()
          
          # 🆕 HAFTALIK RAPOR - Veri çekme gerekmez
          elif job_type == "weekly_report":
              print("=" * 60)
              print("📊 HAFTALIK RAPOR")
              print("=" * 60)
              from services.scheduler import job_weekly_report
              job_weekly_report()
          
          else:
              # DİĞER GÖREVLER - Önce veri çek
              print("=" * 60)
              print("📥 1. AŞAMA: VERİ ÇEKİLİYOR")
              print("=" * 60)
              from services.data_fetcher import fetch_all_daily
              fetch_all_daily(symbols_list=BIST_SYMBOLS, delay=0.05)
              
              print("=" * 60)
              print("🎯 2. AŞAMA: GÖREV ÇALIŞTIRILIYOR")
              print("=" * 60)
              
              if job_type == "morning_preparation":
                  from services.scheduler import job_morning_preparation
                  job_morning_preparation()
              elif job_type == "premarket_report":
                  from services.scheduler import job_premarket_report
                  job_premarket_report()
              elif job_type == "market_open_scan":
                  from services.scheduler import job_market_open_scan
                  job_market_open_scan()
              elif job_type == "full_scan":
                  from services.scheduler import job_full_scan
                  job_full_scan()
              elif job_type == "quick_scan":
                  from services.scheduler import job_quick_scan
                  job_quick_scan()
              elif job_type == "end_of_day_report":
                  from services.scheduler import job_end_of_day_report
                  job_end_of_day_report()
              elif job_type == "full_scan_with_tracking":
                  from services.scheduler import job_full_scan_with_tracking
                  job_full_scan_with_tracking()
          
          print("=" * 60)
          print("✅ TÜM AŞAMALAR TAMAMLANDI")
          print("=" * 60)
          EOF
      
      - name: Sinyal takip gorevi
        if: ${{ github.event.inputs.job_type == 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          python -c "from services.signal_tracker import track_signals_job; track_signals_job()"
      
      # DB KALICILIĞI - YENİ DB'Yİ ARTIFACT OLARAK YÜKLE
      - name: DB'yi Artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-database
          path: borsa_bot.db
          retention-days: 30
          overwrite: true
      
      - name: Tamamlandi
        run: echo "Gorev tamamlandi"
