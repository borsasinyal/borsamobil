name: Borsa Sinyal Bot

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Hangi görev?'
        required: true
        default: 'full_scan'
        type: choice
        options:
          - morning_preparation
          - premarket_report
          - market_open_scan
          - full_scan
          - quick_scan
          - strategy_scan
          - end_of_day_report
          - signal_tracker

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Repo indir
        uses: actions/checkout@v4
      
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Kutuphaneleri yukle
        run: |
          pip install --upgrade pip
          pip install flask yfinance pandas numpy python-telegram-bot apscheduler requests
      
      - name: Veritabani baslat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python database.py
      
      - name: Gunluk veriyi cek (sadece tarama gorevlerinde)
        if: ${{ github.event.inputs.job_type != 'signal_tracker' && github.event.inputs.job_type != 'end_of_day_report' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.data_fetcher import fetch_all_daily; from config import BIST_SYMBOLS; fetch_all_daily(symbols_list=BIST_SYMBOLS, delay=0.05)"
      
      - name: Manuel gorev
        if: ${{ github.event.inputs.job_type != 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.scheduler import job_${{ github.event.inputs.job_type }}; job_${{ github.event.inputs.job_type }}()"
      
      - name: Sinyal takip gorevi
        if: ${{ github.event.inputs.job_type == 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "from services.signal_tracker import track_signals_job; track_signals_job()"
      
      - name: Tamamlandi
        run: echo "Gorev tamamlandi"
