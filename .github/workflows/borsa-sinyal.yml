name: Borsa Sinyal Bot

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Hangi görev?'
        required: true
        default: 'full_scan_with_tracking'
        type: choice
        options:
          - morning_preparation
          - premarket_report
          - market_open_scan
          - full_scan
          - quick_scan
          - strategy_scan
          - end_of_day_report
          - signal_tracker
          - full_scan_with_tracking

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Repo indir
        uses: actions/checkout@v4
      
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Kutuphaneleri yukle
        run: |
          pip install --upgrade pip
          pip install flask yfinance pandas numpy python-telegram-bot apscheduler requests
          pip install --upgrade git+https://github.com/rongardF/tvdatafeed.git
      
      - name: Veritabani baslat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python database.py
      
      - name: Veri cek ve Gorev calistir (BIRLESIK)
        if: ${{ github.event.inputs.job_type != 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          python << 'EOF'
          import sys
          from services.data_fetcher import fetch_all_daily
          from config import BIST_SYMBOLS
          
          # 1. ÖNCE VERİ ÇEK
          print("=" * 60)
          print("📥 1. AŞAMA: VERİ ÇEKİLİYOR")
          print("=" * 60)
          fetch_all_daily(symbols_list=BIST_SYMBOLS, delay=0.05)
          
          # 2. SONRA GÖREVİ ÇALIŞTIR
          print("=" * 60)
          print("🎯 2. AŞAMA: GÖREV ÇALIŞTIRILIYOR")
          print("=" * 60)
          
          job_type = "${{ github.event.inputs.job_type }}"
          
          if job_type == "morning_preparation":
              from services.scheduler import job_morning_preparation
              job_morning_preparation()
          elif job_type == "premarket_report":
              from services.scheduler import job_premarket_report
              job_premarket_report()
          elif job_type == "market_open_scan":
              from services.scheduler import job_market_open_scan
              job_market_open_scan()
          elif job_type == "full_scan":
              from services.scheduler import job_full_scan
              job_full_scan()
          elif job_type == "quick_scan":
              from services.scheduler import job_quick_scan
              job_quick_scan()
          elif job_type == "strategy_scan":
              from services.scheduler import job_strategy_scan
              job_strategy_scan()
          elif job_type == "end_of_day_report":
              from services.scheduler import job_end_of_day_report
              job_end_of_day_report()
          elif job_type == "full_scan_with_tracking":
              from services.scheduler import job_full_scan_with_tracking
              job_full_scan_with_tracking()
          
          print("=" * 60)
          print("✅ TÜM AŞAMALAR TAMAMLANDI")
          print("=" * 60)
          EOF
      
      - name: Sinyal takip gorevi
        if: ${{ github.event.inputs.job_type == 'signal_tracker' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          python -c "from services.signal_tracker import track_signals_job; track_signals_job()"
      
      - name: Tamamlandi
        run: echo "Gorev tamamlandi"
